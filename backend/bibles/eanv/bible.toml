# These are additional aliases for books. Any names specified by \h, \toc1, \toc2, and \toc3 are loaded from USFM files
# as well.
[book_aliases.books]
JHN = ["Example"]

[search]
# Whether to index the bible for search. If unspecified, it will default to true.
index = true

# The list of languages that are used by the bible. A list of supported ones can be found at
# https://github.com/greyblake/whatlang-rs/blob/master/SUPPORTED_LANGUAGES.md. If any of the languages you have are not
# in this list, do not specify any, or languages will get classified incorrectly. Specifying an empty array means no
# language, which is distinct from specifying nothing, and is probably not what you want. It is still importand to
# specify this even if index is set to false, as it's used for book lookup and footnote generation as well.
languages = ["eng"]

# A list of words to ignore in search. Most normalizations are not run on these words, so they must match the words you
# want to exclude exactly, save Unicode quirks like normalization. For languages with particles (e.g. Japanese), you
# would also want to list most particles here.
ignored_words = [
    "a", "A",
    "an", "An", "AN",
    "the", "The", "THE",
    "of", "Of", "OF",
    "and", "And", "AND",
]

# Auto-generated footnotes. Any phrase can be the key, and the first time that phrase is found in a search result, the
# corresponding footnote will be placed just after it, as long as it is found within the specified range. Multiple
# elements may be specified per key in order to have different footnotes for different ranges. Lower values override
# higher ones, so you could specify a note for GEN 1-REV 22, and another note for MAT 1-JHN 21, and the first footnote
# would be present in GEN 1-MAL 4 and ACT 1-REV 22.
[[footnotes.Allah]]
# Each element in the bible_ranges array is a range. A range can either be an array of two values (specifying the start
# and end, inclusive) or a single value, which has the limitation of only being able to be within a single chapter.
bible_ranges = [["GEN 1", "REV 22"]]
# The footnote must be specified in valid USFM, and the entire thing must be a valid note-type marker. See
# https://docs.usfm.bible/usfm/3.1/note/index.html for a list of valid note-type markers.
footnote = "\\f +\\ft This word shows up as \\nd Lord\\nd* in most English translations.\\f*"

[[footnotes.Darkness]]
bible_ranges = ["GEN 1:3"]
footnote = "\\f +\\ft In the Greek, this is Windex.\\f*"
