# fly.toml app configuration file generated for bible-web-framework on 2026-04-10T01:05:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bible-web-framework'
primary_region = 'ord'

[build]

[env]
  DATABASE_URL="sqlite:///bwf/bwf.db"
  DEFAULT_BIBLE="eanv"
  BIBLES_DIR="/bwf/bibles"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
